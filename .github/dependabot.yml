version: 2
updates:
  # Cargo dependencies (Rust)
  - package-ecosystem: "cargo"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:00"
    open-pull-requests-limit: 10
    reviewers:
      - "jerichofoster"
    labels:
      - "dependencies"
      - "rust"
    commit-message:
      prefix: "chore(deps): "
      include: "scope"
    pull-request-branch-name:
      separator: "/"
    allow:
      - dependency-type: "direct"
      - dependency-type: "indirect"
    ignore:
      # Add any package names to ignore here
      # Example: - dependency-name: "package-name"

  # npm dependencies (Frontend)
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:00"
    open-pull-requests-limit: 10
    reviewers:
      - "jerichofoster"
    labels:
      - "dependencies"
      - "typescript"
      - "frontend"
    commit-message:
      prefix: "chore(deps): "
      include: "scope"
    pull-request-branch-name:
      separator: "/"
    allow:
      - dependency-type: "direct"
      - dependency-type: "indirect"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "05:00"
    open-pull-requests-limit: 5
    reviewers:
      - "jerichofoster"
    labels:
      - "ci"
      - "github-actions"
    commit-message:
      prefix: "ci(actions): "
