name: Build & Release (Simple)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-22.04
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Configure Git
        run: |
          git config --global user.email "ci@netctl.local"
          git config --global user.name "NetCtl CI"
          git config --global --add safe.directory "*"
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Install packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            devscripts \
            debhelper \
            npm \
            ruby \
            ruby-dev \
            llvm-dev \
            clang \
            libelf-dev \
            libzstd-dev
          sudo gem install --no-document fpm
      
      - name: Build backend
        run: |
          cd backend
          cargo build --release
          ls -la target/release/ | grep netctl
      
      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build
      
      - name: Build eBPF (optional - skip if issues)
        run: |
          if [ -d "ebpf" ]; then
            cd ebpf
            cargo build --release 2>&1 || echo "⚠️ eBPF build failed but continuing (optional component)"
          fi
        continue-on-error: true
      
      - name: Create Debian package
        run: |
          mkdir -p /tmp/netctl-staging/DEBIAN
          mkdir -p /tmp/netctl-staging/usr/bin
          mkdir -p /tmp/netctl-staging/var/lib/netctl/public
          mkdir -p /tmp/netctl-staging/etc/systemd/system
          mkdir -p /tmp/netctl-staging/var/log/netctl
          
          # Copy binaries - use whatever was built
          cp backend/target/release/netctl-* /tmp/netctl-staging/usr/bin/ 2>/dev/null || true
          chmod 755 /tmp/netctl-staging/usr/bin/netctl* 2>/dev/null || true
          
          # Copy frontend
          if [ -d "frontend/dist" ]; then
            cp -r frontend/dist/* /tmp/netctl-staging/var/lib/netctl/public/ 2>/dev/null || true
          fi
          
          # Create minimal postinst
          mkdir -p /tmp/netctl-staging/DEBIAN
          cat > /tmp/netctl-staging/DEBIAN/postinst << 'EOF'
          #!/bin/bash
          set -e
          systemctl daemon-reload 2>/dev/null || true
          exit 0
          EOF
          chmod 755 /tmp/netctl-staging/DEBIAN/postinst
          
          # Create control file
          cat > /tmp/netctl-staging/DEBIAN/control << 'EOF'
          Package: netctl
          Version: 1.0.0
          Architecture: amd64
          Maintainer: NetCtl <dev@netctl.local>
          Description: Network Control Engine
           Production-grade network management daemon.
          EOF
          
          # Build deb
          dpkg-deb --build /tmp/netctl-staging netctl_1.0.0_amd64.deb
          ls -lah netctl_1.0.0_amd64.deb
      
      - name: Create RPM package
        run: |
          mkdir -p /tmp/rpm-staging/usr/bin
          mkdir -p /tmp/rpm-staging/var/lib/netctl/public
          mkdir -p /tmp/rpm-staging/etc/systemd/system
          
          # Copy binaries
          cp backend/target/release/netctl-* /tmp/rpm-staging/usr/bin/ 2>/dev/null || true
          chmod 755 /tmp/rpm-staging/usr/bin/netctl* 2>/dev/null || true
          
          # Copy frontend
          if [ -d "frontend/dist" ]; then
            cp -r frontend/dist/* /tmp/rpm-staging/var/lib/netctl/public/ 2>/dev/null || true
          fi
          
          # Build RPM
          fpm -s dir -t rpm \
            -n netctl -v 1.0.0 \
            --iteration 1 \
            -p netctl-1.0.0-1.el8.x86_64.rpm \
            -C /tmp/rpm-staging \
            -a x86_64 \
            -m "NetCtl <dev@netctl.local>" \
            --url "https://github.com/BAPPITTO/NetCtl" \
            --description "Network Control Engine"
          
          ls -lah netctl-1.0.0-1.el8.x86_64.rpm
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            netctl_1.0.0_amd64.deb
            netctl-1.0.0-1.el8.x86_64.rpm
          body: |
            ## NetCtl 1.0.0
            
            Production-grade network management daemon.
            
            ### Installation
            
            **Ubuntu/Debian:**
            ```bash
            sudo dpkg -i netctl_1.0.0_amd64.deb
            ```
            
            **CentOS/RHEL:**
            ```bash
            sudo rpm -ivh netctl-1.0.0-1.el8.x86_64.rpm
            ```
